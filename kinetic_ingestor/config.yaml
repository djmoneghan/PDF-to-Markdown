# Metadata-generation inference: Puck's local Gemma 4 31B orchestrator
# (llama-cpp-python server, OpenAI-compatible /v1/chat/completions).
inference:
  endpoint: "http://localhost:8080"
  model: "gemma"
  fallback_model: "gemma"
  timeout_seconds: 180

extraction:
  engine: "docling"          # or "pymupdf"
  confidence_threshold: 0.75 # below this, chunk is auto-flagged for HITL

chunking:
  split_levels: ["#", "##"]  # header levels that trigger a new chunk
  min_chunk_tokens: 100
  max_chunk_tokens: 1500

output:
  processed_root: "../../workspace/processed"
  manifest_filename: "manifest.json"
  corrections_filename: "corrections.json"

hitl:
  auto_accept_above: 0.92    # confidence score above which HITL is skipped
  show_raw_markdown: true

embeddings:
  enabled: true
  model: "nomic-embed-text"                  # Ollama embedding model
  endpoint: "http://localhost:11434"         # Ollama (separate from inference above)
  chroma_persist_dir: "../../workspace/chroma_db"
  collection_name: "kinetic_ingestor_chunks"
  batch_size: 10
  skip_if_embedded: true                     # idempotent re-runs
